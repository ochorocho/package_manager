name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  # Cancel previous runs of the same PR / branch on new pushes.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-qa:
    name: PHPStan + PHP-CS-Fixer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup DDEV
        uses: ddev/github-action-setup-ddev@v1
        with:
          autostart: false

      - name: Start DDEV
        # The `.ddev/scripts/setup-typo3.sh` post-start hook runs
        # `composer install` inside Build/ and provisions the database,
        # so the phpstan + cs-fixer binaries are ready immediately after.
        run: ddev start

      - name: PHPStan (level 5 + strict rules)
        run: ddev exec composer ci:php:stan

      - name: PHP-CS-Fixer (dry-run + diff)
        run: ddev exec composer ci:php:cs

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup DDEV
        uses: ddev/github-action-setup-ddev@v1
        with:
          autostart: false

      - name: Start DDEV
        run: ddev start

      - name: Install npm dependencies
        run: ddev exec -d /var/www/html npm ci --no-audit --no-fund

      - name: Align Playwright Docker image with installed @playwright/test
        # The ddev-playwright container's browser binaries are only
        # compatible with the matching @playwright/test version. Read the
        # resolved version straight from the installed package.json so a
        # renovate bump of @playwright/test keeps the image in sync.
        run: |
          version=$(ddev exec -d /var/www/html jq -r .version node_modules/@playwright/test/package.json)
          echo "Detected @playwright/test version: ${version}"
          ddev dotenv set .ddev/.env.playwright --playwright-docker-image="mcr.microsoft.com/playwright:v${version}-noble"
          ddev restart

      - name: Run Playwright tests
        run: ddev playwright test --reporter=list

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
          if-no-files-found: ignore
