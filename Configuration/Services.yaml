services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Ochorocho\PackageManager\:
    resource: '../Classes/*'

  cache.package_manager:
    class: 'TYPO3\CMS\Core\Cache\Frontend\FrontendInterface'
    factory: ['@TYPO3\CMS\Core\Cache\CacheManager', 'getCache']
    arguments:
      $identifier: 'package_manager'
